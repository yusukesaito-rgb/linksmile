<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>

<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
doc-page:not(:defined){visibility:hidden;}
@media print{
  * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}
</style>
<script>
addEventListener('load', () => {
  (async () => {
    try { await document.fonts.ready; } catch (e) {}
    setTimeout(() => window.print(), 500);
  })();
});
</script>
</helmet>

<x-import component-from-global-scope="doc-page" from="./doc-page.js" hint-size="100%,auto">
<doc-page size="letter" orientation="landscape" margin="0">
  <div style="width:100%;height:100%;min-height:8.5in;display:flex;align-items:center;justify-content:center;background:#fff;">
    <div style="display:flex;align-items:center;gap:26px;">
      <svg width="150" height="140" viewBox="0 0 84 74">
        <path d="M42 66 C42 48 16 48 16 30 C16 18 34 18 42 32" fill="none" stroke="#FF8A5A" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"></path>
        <path d="M42 66 C42 48 68 48 68 30 C68 18 50 18 42 32" fill="none" stroke="#2FA79C" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"></path>
      </svg>
      <span style="font-family:'Poppins',Arial,sans-serif;font-weight:400;font-size:96px;color:#3D372C;letter-spacing:.01em;">Link &amp; Smile</span>
    </div>
  </div>
</doc-page>
</x-import>

</x-dc>
</body>
</html>
