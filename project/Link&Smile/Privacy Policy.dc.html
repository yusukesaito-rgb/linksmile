<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
</style>
</helmet>
<div style="font-family:'Zen Kaku Gothic New',sans-serif;background:#FAF6F0;color:#3D372C;min-height:100vh;line-height:1.9;">
  <header style="padding:26px 44px;border-bottom:1px solid #FFE8D6;background:#fff;">
    <div style="max-width:820px;margin:0 auto;display:flex;align-items:center;gap:10px;">
      <span style="width:7px;height:7px;border-radius:50%;background:#FFB789;display:inline-block;"></span>
      <span style="font-family:'Jost',sans-serif;font-weight:300;font-size:20px;letter-spacing:.12em;">Link & Smile</span>
    </div>
  </header>

  <div style="max-width:820px;margin:0 auto;padding:68px 44px 100px;">
    <div style="font-family:'Jost';font-size:12px;letter-spacing:.3em;color:#FFB789;margin-bottom:16px;">PRIVACY POLICY</div>
    <h1 style="font-size:30px;font-weight:700;letter-spacing:.04em;margin:0 0 40px;">プライバシーポリシー</h1>

    <sc-for list="{{ sections }}" as="s" hint-placeholder-count="5">
      <section style="margin-bottom:38px;">
        <h2 style="font-size:17px;font-weight:700;letter-spacing:.03em;margin:0 0 14px;color:#3D372C;">{{ s.title }}</h2>
        <p style="font-size:14.5px;line-height:2.05;color:#544c41;margin:0;">{{ s.body }}</p>
      </section>
    </sc-for>

    <div style="margin-top:56px;padding-top:28px;border-top:1px solid #FFE8D6;">
      <a href="./Link & Smile LP.dc.html" style="font-size:13.5px;color:#C77A3E;text-decoration:none;">← トップページに戻る</a>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:900,&quot;height&quot;:900}}">
class Component extends DCLogic {
  renderVals() {
    return {
      sections: [
        { title: '1. 個人情報の定義', body: '当スタジオは、個人情報とは個人情報の保護に関する法律に規定される生存する個人に関する情報であると認識しております。' },
        { title: '2. 個人情報の取得・利用目的', body: '当スタジオは、サービス提供のために収集した情報を安全に管理するため、セキュリティに最大限の注意を払うものとします。会員からお預かりした個人情報は、サービスの提供、予約管理、およびスタジオからの重要なお知らせ等のご連絡のために利用いたします。' },
        { title: '3. 個人情報の安全管理', body: '当スタジオは、個人情報の漏洩、滅失または毀損を防止するため、必要かつ適切な措置を講じます。' },
        { title: '4. 第三者への開示・提供の禁止', body: '当スタジオは、法令等に基づき開示が必要な場合を除き、個人情報を会員の同意なしに第三者に提供・開示いたしません。' },
        { title: '5. お問い合わせ窓口', body: '本ポリシーに関するお問い合わせは、当スタジオ担当（伊能竜之介）までご連絡ください。' },
      ],
    };
  }
}
</script>
</body>
</html>
